<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.M.A.R.T. Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>S.M.A.R.T. Goal Tracker</h1>
        <button>Create New Goal</button>
    </header>

    <main>
        <section id="summary-bar">
            <div id="total-goals"></div>
            <div id="in-progress"></div>
            <div id="completed"></div>
        </section>

        <section id="goal-list">
            <p id="empty-state">No goals yet - create a goal now!</p>
        </section>
    </main>

    <footer>
        CS312 Jaden Shelton 2026
    </footer>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/goals.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
